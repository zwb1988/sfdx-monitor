<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salesforce Monitor</title>
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <h1 class="header-title">Salesforce Monitor</h1>
    <div class="theme-switcher">
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to light theme" title="Switch to light theme">☀</button>
    </div>
  </header>
  <main class="main">
    <section class="controls controls-row controls-row--top" aria-label="Environment and refresh">
      <div class="control-group">
        <label for="org-select">Environment</label>
        <select id="org-select" aria-label="Select environment">
          <option value="">Select an org</option>
        </select>
      </div>
      <div class="control-group">
        <label for="interval-input">Refresh interval (seconds)</label>
        <input type="number" id="interval-input" min="1" value="10" aria-label="Refresh interval in seconds" disabled>
      </div>
    </section>
    <div class="tabs" role="tablist" aria-label="Main views">
      <button type="button" id="tab-batch-monitor" class="tab" role="tab" aria-selected="true" aria-controls="tab-panel-batch-monitor" tabindex="0">Batch monitor</button>
      <button type="button" id="tab-batch-schedule" class="tab" role="tab" aria-selected="false" aria-controls="tab-panel-batch-schedule" tabindex="-1">Batch schedule</button>
    </div>
    <p id="status-message" class="status-message status-message--tabs" aria-live="polite"></p>
    <section id="tab-panel-batch-monitor" class="tab-panel" role="tabpanel" aria-labelledby="tab-batch-monitor">
      <section class="controls controls-row">
        <div class="control-group">
          <label for="job-id-input">Job ID (monitor single job)</label>
          <input type="text" id="job-id-input" placeholder="e.g. 707xx0000012345" aria-label="Job ID filter" disabled>
        </div>
        <div class="control-group">
          <label for="search-input">Search by class name</label>
          <input type="text" id="search-input" placeholder="Apex class name" aria-label="Search batch by name" disabled>
        </div>
        <div class="control-group">
          <label for="limit-input">Number of results</label>
          <input type="number" id="limit-input" min="1" max="2000" value="100" aria-label="SOQL result limit" disabled>
        </div>
      </section>
      <section class="filters-section" id="filters-section">
        <fieldset class="status-filters" id="status-filters">
          <legend>Filter by status</legend>
          <div class="status-checkboxes" id="status-checkboxes"></div>
        </fieldset>
      </section>
      <section class="table-section">
        <div class="table-toolbar timezone-option">
          <div class="timezone-option-left">
            <label class="timezone-option-label">
              <input type="checkbox" id="show-local-tz" aria-describedby="timezone-display">
              Show in local time
            </label>
            <span id="timezone-display" class="timezone-display" aria-live="polite">UTC</span>
          </div>
          <div class="table-header-actions">
            <button type="button" id="batch-export-csv-btn" class="export-csv-btn btn-icon" aria-label="Export batch jobs as CSV" disabled title="Download all rows as CSV (full records)"><svg class="export-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            <button type="button" id="refresh-now-btn" class="refresh-btn btn-icon" aria-label="Refresh now" disabled title="Refresh now">↻</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="batch-jobs-table" class="jobs-table" aria-label="Batch jobs">
            <thead>
              <tr>
                <th data-sort="id" class="sortable">Batch ID</th>
                <th data-sort="apexClassName" class="sortable">Apex Class Name</th>
                <th data-sort="jobType" class="sortable">Job Type</th>
                <th data-sort="jobItemsProcessed" class="sortable">Job Items Processed</th>
                <th data-sort="status" class="sortable">Status</th>
                <th data-sort="totalJobItems" class="sortable">Total Job Items</th>
                <th data-sort="progress" class="sortable">Progress</th>
                <th data-sort="startedAt" class="sortable">Started</th>
                <th data-sort="completedAt" class="sortable">Completed</th>
              </tr>
            </thead>
            <tbody id="jobs-tbody">
            </tbody>
          </table>
        </div>
      </section>
    </section>
    <section id="tab-panel-batch-schedule" class="tab-panel" role="tabpanel" aria-labelledby="tab-batch-schedule" hidden>
      <section class="schedule-section table-section">
        <div class="table-toolbar timezone-option">
          <div class="timezone-option-left">
            <label class="timezone-option-label">
              <input type="checkbox" id="schedule-show-local-tz" aria-describedby="schedule-timezone-display" disabled>
              Show in local time
            </label>
            <span id="schedule-timezone-display" class="timezone-display" aria-live="polite">UTC</span>
          </div>
          <div class="table-header-actions schedule-toolbar-actions">
            <button type="button" id="schedule-state-info-btn" class="info-icon-btn btn-icon" aria-label="Scheduled job state reference" title="What scheduled job states mean">ℹ</button>
            <button type="button" id="schedule-export-csv-btn" class="export-csv-btn btn-icon" aria-label="Export scheduled jobs as CSV" disabled title="Download all rows as CSV (full records)"><svg class="export-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            <button type="button" id="schedule-refresh-btn" class="refresh-btn btn-icon" aria-label="Refresh scheduled jobs" disabled title="Refresh scheduled jobs">↻</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="schedule-jobs-table" class="jobs-table schedule-table" aria-label="Scheduled Apex jobs">
            <thead>
              <tr>
                <th data-sort="name" class="sortable">Name</th>
                <th data-sort="state" class="sortable">State</th>
                <th data-sort="cronExpression" class="sortable">Cron expression</th>
                <th data-sort="nextFireTime" class="sortable">Next fire</th>
                <th data-sort="previousFireTime" class="sortable">Previous fire</th>
                <th data-sort="apexClassName" class="sortable">Apex class name</th>
              </tr>
            </thead>
            <tbody id="scheduled-tbody">
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <footer class="footer">
    <p class="footer-copyright">© 2026. Generated by AI.</p>
  </footer>
  <div id="batch-detail-overlay" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="batch-detail-title" aria-modal="true">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="batch-detail-title" class="modal-title">Batch details</h2>
        <button type="button" class="modal-close" aria-label="Close">×</button>
      </div>
      <div id="batch-detail-content" class="modal-content"></div>
    </div>
  </div>
  <div id="schedule-state-help-overlay" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="schedule-state-help-title" aria-modal="true">
    <div class="modal-dialog modal-dialog--reference">
      <div class="modal-header">
        <h2 id="schedule-state-help-title" class="modal-title">Scheduled job states</h2>
        <button type="button" class="modal-close" aria-label="Close reference">×</button>
      </div>
      <div id="schedule-state-help-content" class="modal-content modal-content--reference"></div>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
